networks:
  atus-net:
    driver: bridge

volumes:
  atus-data:

services:

  ray-head:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: atus-ray-head
    command: >
      bash -c "
        ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --num-cpus=2 &&
        streamlit run dashboard/app.py
          --server.port=8501 --server.address=0.0.0.0 --server.headless=true
      "
    ports:
      - "8501:8501"
      - "8265:8265"
      - "6379:6379"
    volumes:
      - atus-data:/app/data
      - ../data/raw:/app/data/raw:ro
      - ../src:/app/src
      - ../dashboard:/app/dashboard
    networks:
      - atus-net
    environment:
      - RAY_DISABLE_IMPORT_WARNING=1

  ray-worker-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: atus-worker-1
    depends_on:
      - ray-head
    volumes:
      - atus-data:/app/data
    networks:
      - atus-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  ray-worker-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: atus-worker-2
    depends_on:
      - ray-head
    volumes:
      - atus-data:/app/data
    networks:
      - atus-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G